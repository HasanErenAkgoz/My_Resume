services:
  # Angular SSR (Node/Express) — renders the site + serves static assets.
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=4000
    expose:
      - "4000"
    restart: unless-stopped

  # AI chat backend — .NET 8 + SignalR hub at /hubs/chat (CV-only context).
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - ASPNETCORE_URLS=http://+:8080
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-4o-mini}
      - AI_CHAT_RATE_LIMIT_PER_HOUR=${AI_CHAT_RATE_LIMIT_PER_HOUR:-10}
    expose:
      - "8080"
    restart: unless-stopped

  # Reverse proxy — single public origin so the browser reaches the hub at
  # same-origin /hubs/chat (matches the frontend's production URL resolution).
  proxy:
    image: nginx:1.27-alpine
    depends_on:
      - web
      - api
    ports:
      - "8080:8080"
    volumes:
      - ./deploy/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped
