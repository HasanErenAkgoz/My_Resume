  <!-- Hide SSR content until boot intro finishes (first visit per session). -->
  <script>
    (function () {
      try {
        if (sessionStorage.getItem('cv-boot-shown') === '1') return;
        if (/\bmode=scan\b/.test(location.search)) return;
        if (localStorage.getItem('cv-mode') === 'scan') return;
        if (matchMedia('(prefers-reduced-motion: reduce)').matches) return;
        document.documentElement.classList.add('boot-pending');
      } catch (e) {}
    })();
  </script>
  <style>
    html.boot-pending body {
      background: #050410;
    }
    html.boot-pending app-header,
    html.boot-pending #main,
    html.boot-pending app-footer {
      visibility: hidden;
    }
  </style>
